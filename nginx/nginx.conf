# =============================================================================
# CAFA-5 API gateway —  limits, body sizes, timeouts, logging
#
# Documented defaults (tune per environment):
#   Rate limit (IP):  admin routes 15 req/s, burst 40  |  predict 30 req/s, burst 80
#                     Per-token / JWT buckets are not supported in stock nginx;
#                     use the same zones or OpenResty / auth_request + Redis.
#   Body size caps:  /api/v1/ 512m  |  /api/train 64m  |  /api/predict/ 8m  |  /mlflow/ 32m
#   Timeouts:         proxy_connect_timeout 10s; proxy_read/send 600s (long jobs)
#
# Logging:
#   access_log → stdout, one line per request with trace id, Basic-auth user, path tier.
#   error_log  → stderr (format is fixed in open-source nginx; correlate failures with
#                access_log trace: msec + connection + connection_requests).
#
# Validation:
#   429:  for i in $(seq 1 200); do curl -sk -o /dev/null -w "%{http_code}\n" -u USER:PASS \
#           https://127.0.0.1/api/predict/health; done
#   413:  dd if=/dev/zero bs=1M count=12 2>/dev/null | curl -sk -u USER:PASS -X POST \
#           --data-binary @- -H 'Content-Type: application/octet-stream' \
#           https://127.0.0.1/api/predict/predict
# =============================================================================

worker_processes auto; # number of worker processes for NGINX
error_log /dev/stderr notice; # error log for NGINX
pid /var/run/nginx.pid; # PID file for NGINX

events {
    worker_connections 1024;
}

# HTTP configuration for NGINX
http {
    include /etc/nginx/mime.types; # include mime types for NGINX
    default_type application/octet-stream; # default type for NGINX
    sendfile on;
    keepalive_timeout 65; # keepalive timeout for NGINX
    server_tokens off; # server tokens off for NGINX
    resolver 127.0.0.11 valid=30s ipv6=off; # resolver for NGINX

    limit_req_zone $binary_remote_addr zone=rl_admin:10m rate=15r/s; # limit request zone for admin API
    limit_req_zone $binary_remote_addr zone=rl_predict:10m rate=30r/s; # limit request zone for predict API
    limit_req_status 429; # status code for limit request

    # map request URI to access tier for NGINX
    map $request_uri $access_tier {
        default unknown; # default access tier for NGINX
        ~^/api/predict/ predict; # predict API
        ~^/api/v1/      embedding; # embedding API
        ~^/api/train    train; # train API
        ~^/mlflow/      mlflow; # mlflow API
    }

    # Trace id: unique enough per request for ops; forwarded to upstreams as X-Trace-Id for NGINX
    log_format gateway # log format for NGINX
        'trace=$msec-$connection-$connection_requests ' # trace ID
        'remote=$remote_addr user=$remote_user tier=$access_tier ' # remote address, user, access tier
        'method=$request_method uri=$request_uri status=$status ' # request method, URI, status
        'bytes=$body_bytes_sent rt=$request_time ' # body bytes sent, request time
        'xff=$http_x_forwarded_for'; # forwarded for

    access_log /dev/stdout gateway; # access log for NGINX

    #client_max_body_size 16m; # client max body size for NGINX
    client_body_timeout 60s; # client body timeout for NGINX

    proxy_connect_timeout 10s; # proxy connect timeout for NGINX
    proxy_read_timeout 1800s; # proxy read timeout for NGINX
    proxy_send_timeout 600s; # proxy send timeout for NGINX
    proxy_http_version 1.1; # proxy HTTP version for NGINX

    # redirect HTTP to HTTPS for NGINX
    server { # server block for NGINX
        listen 80; # listen on port 80 for NGINX
        server_name localhost; # server name for NGINX
        return 301 https://$host$request_uri; # redirect to HTTPS
    }

    # HTTPS server block for NGINX
    server {
        listen 443 ssl; # listen on port 443 for NGINX
        server_name localhost; # server name for NGINX

        ssl_certificate /etc/nginx/certs/nginx.crt; # SSL certificate for NGINX
        ssl_certificate_key /etc/nginx/certs/nginx.key; # SSL certificate key for NGINX

        proxy_set_header Host $host; # set host header for NGINX
        proxy_set_header X-Real-IP $remote_addr; # set real IP header for NGINX
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # set forwarded for header for NGINX
        proxy_set_header X-Forwarded-Proto $scheme; # set forwarded protocol header for NGINX

        set $trace_id "${msec}_${connection}_${connection_requests}"; # set trace ID for NGINX
        proxy_set_header X-Trace-Id $trace_id; # set trace ID header for NGINX
        proxy_set_header X-Access-Tier $access_tier; # set access tier header for NGINX
        proxy_set_header X-Auth-User $remote_user; # set auth user header for NGINX

        # embedding API — admin only
        location /api/v1/ {
            client_max_body_size 512m; # client max body size for NGINX
            limit_req zone=rl_admin burst=40 nodelay; # limit request zone for admin API
            set $embedding_api_upstream embedding-api:8000;
            proxy_pass http://$embedding_api_upstream; # proxy pass for embedding API
            auth_basic "Admin"; # auth basic for admin API
            auth_basic_user_file /etc/nginx/.htpasswd-admin; # auth basic user file for admin API
        }

        # trainer-api is only started with the optional training profile.
        # Using a variable in proxy_pass defers DNS resolution to request time,
        # so nginx can start without it.
        location /api/train {
            client_max_body_size 64m;
            limit_req zone=rl_admin burst=40 nodelay;
            # Resolve trainer-api at request time so nginx can start
            # even when the optional training profile is not running.
            set $trainer_api_upstream trainer-api:8000;
            proxy_pass http://$trainer_api_upstream;
            auth_basic "Admin";
            auth_basic_user_file /etc/nginx/.htpasswd-admin;
        }

        # GO prediction API — regular user + admin (.htpasswd-user lists both)
        location /api/predict/ {
            client_max_body_size 8m; # client max body size for NGINX
            limit_req zone=rl_predict burst=80 nodelay; # limit request zone for predict API
            set $go_prediction_api_upstream go-prediction-api:8000;
            proxy_pass http://$go_prediction_api_upstream; # proxy pass for GO prediction API
            auth_basic "Prediction API"; # auth basic for GO prediction API
            auth_basic_user_file /etc/nginx/.htpasswd-user; # auth basic user file for GO prediction API
        }

        # Training API — regular user + admin (.htpasswd-user lists both)
        location /api/v1/predict-go-from-sequences {
            client_max_body_size 512m; # client max body size for NGINX
            limit_req zone=rl_predict burst=80 nodelay; # limit request zone for predict API
            set $embedding_api_upstream embedding-api:8000;
            proxy_pass http://$embedding_api_upstream; # proxy pass for GO prediction API

            auth_basic "Prediction API"; # auth basic for GO prediction API
            auth_basic_user_file /etc/nginx/.htpasswd-user; # auth basic user file for GO prediction API
        }

        # MLflow UI — admin only
        location /mlflow/ {
            client_max_body_size 32m; # client max body size for NGINX
            limit_req zone=rl_admin burst=40 nodelay; # limit request zone for admin API
            proxy_pass http://mlflow:5000/; # proxy pass for MLflow
            proxy_redirect off; # proxy redirect off for NGINX
            auth_basic "Admin"; # auth basic for admin API
            auth_basic_user_file /etc/nginx/.htpasswd-admin; # auth basic user file for admin API
        }

        # Streamlit UI (public path, API auth is provided inside the UI form)
        location = /ui {
            return 301 /ui/;
        }

        location /ui/ {
            # Resolve streamlit-ui at request time to avoid stale container IPs.
            set $streamlit_ui_upstream streamlit-ui:8501;
            # rewrite the path to remove the /ui/ prefix
            rewrite ^/ui/(.*)$ /$1 break;
            proxy_pass http://$streamlit_ui_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            auth_basic off;
        }

        # health check for NGINX
        location = / {
            default_type application/json; # default type for NGINX
            return 200 '{"gateway":"cafa5","docs":"/api/v1/health (embedding), /api/predict/health (go), /api/train/health (train)"}\n'; # return health check for NGINX
        }

        # 404 for NGINX
        location / {
            return 404; # return 404 for NGINX
        }
    }
}
