# =============================================================================
# CAFA-5 API gateway â€”  limits, body sizes, timeouts, logging
#
# Documented defaults (tune per environment):
#   Rate limit (IP):  admin routes 15 req/s, burst 40  |  predict 30 req/s, burst 80
#                     Per-token / JWT buckets are not supported in stock nginx;
#                     use the same zones or OpenResty / auth_request + Redis.
#   Body size caps:  /api/v1/ 512m  |  /api/train 64m  |  /api/predict/ 8m  |  /mlflow/ 32m
#   Timeouts:         proxy_connect_timeout 10s; proxy_read/send 600s (long jobs)
#
# Logging:
#   access_log â†’ stdout, one line per request with trace id, Basic-auth user, path tier.
#   error_log  â†’ stderr (format is fixed in open-source nginx; correlate failures with
#                access_log trace: msec + connection + connection_requests).
#
# Validation:
#   429:  for i in $(seq 1 200); do curl -sk -o /dev/null -w "%{http_code}\n" -u USER:PASS \
#           https://127.0.0.1/api/predict/health; done
#   413:  dd if=/dev/zero bs=1M count=12 2>/dev/null | curl -sk -u USER:PASS -X POST \
#           --data-binary @- -H 'Content-Type: application/octet-stream' \
#           https://127.0.0.1/api/predict/predict
# =============================================================================

worker_processes auto;
error_log /dev/stderr notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;
    resolver 127.0.0.11 valid=30s ipv6=off;

    limit_req_zone $binary_remote_addr zone=rl_admin:10m rate=15r/s;
    limit_req_zone $binary_remote_addr zone=rl_predict:10m rate=30r/s;
    limit_req_status 429;

    map $request_uri $access_tier {
        default unknown;
        ~^/api/predict/ predict;
        ~^/api/v1/      embedding;
        ~^/api/train    train;
        ~^/mlflow/      mlflow;
    }

    # Trace id: unique enough per request for ops; forwarded to upstreams as X-Trace-Id
    log_format gateway
        'trace=$msec-$connection-$connection_requests '
        'remote=$remote_addr user=$remote_user tier=$access_tier '
        'method=$request_method uri=$request_uri status=$status '
        'bytes=$body_bytes_sent rt=$request_time '
        'xff=$http_x_forwarded_for';

    access_log /dev/stdout gateway;

    client_max_body_size 16m;
    client_body_timeout 60s;

    proxy_connect_timeout 10s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_http_version 1.1;

    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        set $trace_id "${msec}_${connection}_${connection_requests}";
        proxy_set_header X-Trace-Id $trace_id;
        proxy_set_header X-Access-Tier $access_tier;
        proxy_set_header X-Auth-User $remote_user;

        location /api/v1/ {
            client_max_body_size 512m;
            limit_req zone=rl_admin burst=40 nodelay;
            proxy_pass http://embedding-api:8000;
            auth_basic "Admin";
            auth_basic_user_file /etc/nginx/.htpasswd-admin;
        }

        location /api/train {
            client_max_body_size 64m;
            limit_req zone=rl_admin burst=40 nodelay;
            # Resolve trainer-api at request time so nginx can start
            # even when the optional training profile is not running.
            set $trainer_api_upstream trainer-api:8000;
            proxy_pass http://$trainer_api_upstream;
            auth_basic "Admin";
            auth_basic_user_file /etc/nginx/.htpasswd-admin;
        }

        location /api/predict/ {
            client_max_body_size 8m;
            limit_req zone=rl_predict burst=80 nodelay;
            proxy_pass http://go-prediction-api:8000/;
            auth_basic "Prediction API";
            auth_basic_user_file /etc/nginx/.htpasswd-user;
        }

        # Training API â€” regular user + admin (.htpasswd-user lists both)
        location /api/v1/predict-go-from-sequences {
            client_max_body_size 512m;
            limit_req zone=rl_predict burst=80 nodelay;
            proxy_pass http://go-prediction-api:8000/predict-go-from-sequences;

            auth_basic "Prediction API";
            auth_basic_user_file /etc/nginx/.htpasswd-user;
        }

        # Training API â€” regular user + admin (.htpasswd-user lists both)

        # MLflow UI â€” admin only
        location /mlflow/ {
            client_max_body_size 32m;
            limit_req zone=rl_admin burst=40 nodelay;
            proxy_pass http://mlflow:5000/;
            proxy_redirect off;
            auth_basic "Admin";
            auth_basic_user_file /etc/nginx/.htpasswd-admin;
        }

        location = / {
            default_type application/json;
            return 200 '{"gateway":"cafa5","docs":"/api/v1/health (embedding), /api/predict/health (go), /api/train/health (train)"}\n';
        }

        location / {
            return 404;
        }
    }
}
