services:
  embedding-api:
    build:
      context: .
      dockerfile: Dockerfile.embedding-api
    image: cafa5-embedding-api:cpu
    ports:
      - "8000:8000"
    volumes:
      # Persist artifacts and job DB.
      - ./outputs:/app/outputs
      # Persist Hugging Face model/tokenizer cache across restarts.
      - ./data/hf_cache:/app/data/hf_cache
    environment:
      - PYTHONUNBUFFERED=1
