data:
  data_dir: "data/cafa-5-protein-function-prediction"
  # FASTA source used by scripts/embed_sequences.py
  train_fasta: "data/cafa-5-protein-function-prediction/Train/train_sequences.fasta"
  embeddings_dir: "data/embeddings"
  embeddings_source: "ESM2"        # ESM2 | ProtBERT | T5
  num_labels: 500
  train_val_split: 0.9
  # Holdout split for quick offline evaluation (from labeled protein IDs)
  holdout_fraction: 0.1
  splits_dir: "outputs/splits"

embedding:
  # HF encoder backend to use for embedding generation.
  # If omitted, scripts will fall back to `data.embeddings_source`.
  backend: "esm2"                 # esm2 | prot_bert | prot_t5
  hf_cache_dir: "data/hf_cache"
  pooling: "mean"               # mean | cls
  max_length: 1280             # ESM2: 1280 | ProtBERT: 1024 | T5: 1024
  batch_size: 8
  fp16: true
  num_workers: 0
  generated_subdir_prefix: "hf_"

model:
  type: "cnn1d"                      # mlp | cnn1d
  # MLP-specific
  mlp_hidden_dims: [864, 712]
  # CNN-specific
  cnn_out_channels: [3, 8]
  cnn_kernel_size: 3

training:
  epochs: 20
  batch_size: 128
  learning_rate: 0.001
  scheduler_factor: 0.1
  scheduler_patience: 1
  seed: 42

prediction:
  datatype: "holdout" # test | holdout
  
output:
  output_dir: "outputs"
