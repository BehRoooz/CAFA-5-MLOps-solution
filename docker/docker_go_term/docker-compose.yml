services:
  cafa5-cpu:
    profiles: ["cpu"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-cpu
    image: cafa5-runner:cpu-dev
    working_dir: /app
    stdin_open: true
    tty: true
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-file:/mlruns}
    volumes:
      - ./src:/app/src:z
      - ./scripts:/app/scripts:z
      - ./services:/app/services:z
      - ./configs:/app/configs:ro,z
      - ./data:/app/data:z
      - ./outputs:/app/outputs:z
      - ./mlruns:/mlruns:z
      - ./README.md:/app/README.md:ro,z
      - ./pyproject.toml:/app/pyproject.toml:ro,z
    command: bash

  cafa5-nvidia:
    profiles: ["nvidia"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-nvidia
    image: cafa5-runner:nvidia-dev
    working_dir: /app
    stdin_open: true
    tty: true
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-file:/mlruns}
    volumes:
      - ./src:/app/src:z
      - ./scripts:/app/scripts:z
      - ./services:/app/services:z
      - ./configs:/app/configs:ro,z
      - ./data:/app/data:z
      - ./outputs:/app/outputs:z
      - ./mlruns:/mlruns:z
      - ./README.md:/app/README.md:ro,z
      - ./pyproject.toml:/app/pyproject.toml:ro,z
    gpus: all
    command: bash

  cafa5-amd:
    profiles: ["amd"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-amd
      args:
        ROCM_BASE_IMAGE: ${ROCM_BASE_IMAGE:-rocm/pytorch:latest}
    image: cafa5-runner:amd-dev
    working_dir: /app
    stdin_open: true
    tty: true
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-file:/mlruns}
      HSA_OVERRIDE_GFX_VERSION: "12.0.0"
      HIP_VISIBLE_DEVICES: "0"
      ROCR_VISIBLE_DEVICES: "0"
    volumes:
      - ./src:/app/src:z
      - ./scripts:/app/scripts:z
      - ./services:/app/services:z
      - ./configs:/app/configs:ro,z
      - ./data:/app/data:z
      - ./outputs:/app/outputs:z
      - ./mlruns:/mlruns:z
      - ./README.md:/app/README.md:ro,z
      - ./pyproject.toml:/app/pyproject.toml:ro,z
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    ipc: host
    shm_size: "8gb"
    command: bash

  embedding-api:
    profiles: ["api"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-api
    image: cafa5-embedding-api:dev
    working_dir: /app/services/embedding-api
    stdin_open: true
    tty: true
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app:/app/services/embedding-api
    volumes:
      - ./src:/app/src:z
      - ./services:/app/services:z
      - ./configs:/app/configs:ro,z
      - ./data:/app/data:z
      - ./outputs:/app/outputs:z
      - ./README.md:/app/README.md:ro,z
      - ./pyproject.toml:/app/pyproject.toml:ro,z
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
