# Integrated stack: Embedding API + GO Prediction API + MLflow + Training API.
# Single public entry: nginx on port 80. Run from repo root: docker compose up --build
# Training API: docker compose --profile training up --build
networks:
  cafa5:
    driver: bridge

services:
  trainer-api:
    build:
      context: .
      dockerfile: docker/docker_training/Dockerfile.training
    image: cafa5-trainer-api:local
    working_dir: /app
    profiles: ["training"]
    networks: [cafa5]
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # Browser URL for MLflow links from GET /api/train/jobs/{id} (via gateway, HTTPS)
      MLFLOW_EXTERNAL_UI_BASE: https://127.0.0.1/mlflow
      REGISTERED_MODEL_NAME: cafa-go-model
      PROMOTION_THRESHOLD: "0.35"
    depends_on:
      - mlflow
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./mlruns:/mlruns

  embedding-api:
    build:
      context: .
      dockerfile: docker/docker_embedding/Dockerfile.embedding-api
    image: cafa5-embedding-api:local
    working_dir: /app/services/embedding-api
    networks: [cafa5]
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app:/app/services/embedding-api
      GO_PREDICTION_API_URL: http://go-prediction-api:8000
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - go-prediction-api
      - mlflow
    volumes:
      - ./outputs:/app/outputs
      - ./data/hf_cache:/app/data/hf_cache

  go-prediction-api:
    build:
      context: .
      dockerfile: docker/docker_go_term/Dockerfile.api
    image: cafa5-go-prediction-api:local
    working_dir: /app/services/go-prediction-api
    networks: [cafa5]
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app:/app/services/go-prediction-api
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_URI: models:/cafa-go-model@champion
      MODEL_CACHE_DIR: /app/model_cache
    depends_on:
      - mlflow
    volumes:
      - ./outputs:/app/outputs

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    networks: [cafa5]
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri file:///mlruns
      --default-artifact-root file:///mlruns
    volumes:
      - ./mlruns:/mlruns

  nginx:
    image: nginx:latest
    networks: [cafa5]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd-admin:/etc/nginx/.htpasswd-admin:ro
      - ./nginx/.htpasswd-user:/etc/nginx/.htpasswd-user:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - embedding-api
      - go-prediction-api
      - mlflow
