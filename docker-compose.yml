# Integrated stack: Embedding API + GO Prediction API + MLflow.
# Run from repo root: docker compose up --build
services:
  trainer:
    build:
      context: .
      dockerfile: docker/docker_training/Dockerfile.training
    image: cafa5-trainer:local
    working_dir: /app
    profiles: ["training"]
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REGISTERED_MODEL_NAME: cafa-go-model
      PROMOTION_THRESHOLD: "0.35"
    command: ["scripts/retrain_pipeline.py", "--config", "configs/config.yaml"]
    depends_on:
      - mlflow
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./mlruns:/mlruns

  embedding-api:
    build:
      context: .
      dockerfile: docker/docker_embedding/Dockerfile.embedding-api
    image: cafa5-embedding-api:local
    working_dir: /app/services/embedding-api
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app:/app/services/embedding-api
      GO_PREDICTION_API_URL: http://go-prediction-api:8000
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - go-prediction-api
      - mlflow
    volumes:
      - ./outputs:/app/outputs
      - ./data/hf_cache:/app/data/hf_cache
    ports:
      - "8000:8000"

  go-prediction-api:
    build:
      context: .
      dockerfile: docker/docker_go_term/Dockerfile.api
    image: cafa5-go-prediction-api:local
    working_dir: /app/services/go-prediction-api
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app:/app/services/go-prediction-api
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_URI: models:/cafa-go-model@champion
      MODEL_CACHE_DIR: /app/model_cache
    depends_on:
      - mlflow
    ports:
      - "8001:8000"
    volumes:
      - ./outputs:/app/outputs

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    command: mlflow server --host 0.0.0.0 --port 5000
    volumes:
      - ./mlruns:/mlruns
    ports:
      - "5000:5000"
